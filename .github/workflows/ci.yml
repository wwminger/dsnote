name: CI Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-containers:
    name: Build Containers
    runs-on: ubuntu-latest
    environment: dockerhub
    permissions:
      contents: read
    outputs:
      containers-built: ${{ steps.build.outputs.success }}
    steps:
      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Debug Vars
        run: |
          echo "Variable DOCKERHUB_USER is: ${{ vars.DOCKERHUB_USER }}"
          if [ -z "${{ vars.DOCKERHUB_USER }}" ]; then
            echo "::error::Variable DOCKERHUB_USER is empty! Check your repository settings."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Unique Tag
        id: meta_tag
        run: |
          DATE=$(date +'%Y%m%d')
          SHA=${{ github.sha }}
          SHORT_SHA=${SHA:0:7}
          echo "tag=v${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push containers
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USER }}/dsnote-builder:${{ steps.meta_tag.outputs.tag }}
            ${{ vars.DOCKERHUB_USER }}/dsnote-builder:latest
            ${{ vars.DOCKERHUB_USER }}/dsnote-aarch64-builder:${{ steps.meta_tag.outputs.tag }}
            ${{ vars.DOCKERHUB_USER }}/dsnote-aarch64-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-x86_64:
    name: Build x86_64
    runs-on: ubuntu-latest
    environment: dockerhub
    needs: [build-containers]
    container:
      image: ${{ vars.DOCKERHUB_USER }}/dsnote-builder:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare and build
        run: |
          cp arch/git/* .
          sed -i "s/CI_BUILD=false/CI_BUILD=true/" PKGBUILD
          sed -i "s/FULL_BUILD=true/FULL_BUILD=false/" PKGBUILD
          # Change ownership to builduser
          chown -R builduser:builduser .
          # Build as builduser
          sudo -u builduser makepkg --syncdeps --noconfirm
          mkdir -p artifacts
          mv dsnote-git-*-x86_64.pkg.tar.zst artifacts/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dsnote-x86_64
          path: artifacts/*.pkg.tar.zst
          retention-days: 7

  build-aarch64:
    name: Build aarch64
    runs-on: ubuntu-latest
    environment: dockerhub
    needs: [build-containers]
    container:
      image: ${{ vars.DOCKERHUB_USER }}/dsnote-builder:latest
      options: --platform linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare and build
        run: |
          cp arch/git/* .
          sed -i "s/CI_BUILD=false/CI_BUILD=true/" PKGBUILD
          sed -i "s/FULL_BUILD=false/FULL_BUILD=true/" PKGBUILD
          # Change ownership to builduser
          chown -R builduser:builduser .
          # Build as builduser
          sudo -u builduser makepkg --syncdeps --noconfirm
          mkdir -p artifacts
          mv dsnote-git-*-aarch64.pkg.tar.zst artifacts/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dsnote-aarch64
          path: artifacts/*.pkg.tar.zst
          retention-days: 7

  release:
    name: Create Release
    needs: [build-containers, build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: dsnote-x86_64
          path: ./artifacts

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: dsnote-aarch64
          path: ./artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.pkg.tar.zst > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          generate_release_notes: true
          body: |
            ## Build Information
            - Commit: ${{ github.sha }}
            - Build Date: ${{ github.event.head_commit.timestamp }}
            - Branch: ${{ github.ref_name }}

            ## SHA256 Checksums
            ```
            $(cat artifacts/SHA256SUMS.txt)
            ```
